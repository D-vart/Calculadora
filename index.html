<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Simples</title>
    <link rel="stylesheet" href="css/stilo.css">
</head>
<body>
    <div class="calculadora" role="application" aria-label="Calculadora básica">
        <input type="text" id="visor" class="visor" readonly aria-label="Visor da calculadora">
        
        <!-- Botões em uma tabela simples -->
        <table class="botoes">
            <tr>
                <td><button class="numero">7</button></td>
                <td><button class="numero">8</button></td>
                <td><button class="numero">9</button></td>
                <td><button class="operador">/</button></td>
            </tr>
            <tr>
                <td><button class="numero">4</button></td>
                <td><button class="numero">5</button></td>
                <td><button class="numero">6</button></td>
                <td><button class="operador">*</button></td>
            </tr>
            <tr>
                <td><button class="numero">1</button></td>
                <td><button class="numero">2</button></td>
                <td><button class="numero">3</button></td>
                <td><button class="operador">-</button></td>
            </tr>
            <tr>
                <td><button class="numero">0</button></td>
                <td><button class="numero">.</button></td>
                <td><button class="limpar">C</button></td>
                <td><button class="operador">+</button></td>
            </tr>
            <tr>
                <td colspan="4"><button class="igual">=</button></td>
            </tr>
        </table>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
